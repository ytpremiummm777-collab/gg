<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>Study App Dark Pro</title>
    
    <style>
        :root {
            --primary: #00E5FF; /* Ciano vibrante */
            --success: #00C853;
            --danger: #FF5252;
            --bg: #000000; /* Fundo Preto */
            --card-bg: #121212; /* Cinza muito escuro */
            --text: #FFFFFF;
            --accent: #FFD600; /* Amarelo para detalhes */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background: var(--card-bg);
            color: var(--primary);
            width: 100%;
            padding: 1.5rem 0;
            text-align: center;
            box-shadow: 0 2px 15px rgba(0, 229, 255, 0.1);
            border-bottom: 1px solid #333;
        }

        .container {
            width: 90%;
            max-width: 450px;
            padding: 20px 0;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #222;
        }

        h2 { color: var(--accent); margin-top: 0; }

        /* Estilo do Cronômetro Editável */
        .timer-wrapper {
            position: relative;
            display: inline-block;
            margin: 10px 0;
        }

        #timerDisplay {
            font-size: 5rem;
            font-weight: bold;
            color: var(--primary);
            font-variant-numeric: tabular-nums;
            cursor: pointer;
            border-bottom: 2px dashed #333;
        }

        #timerDisplay:hover {
            color: var(--accent);
        }

        .edit-hint {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 15px;
        }

        .timer-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        button {
            padding: 15px 25px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        #startBtn { background: var(--success); color: white; flex: 2; }
        #resetBtn { background: #333; color: white; flex: 1; }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 15px;
            border: 2px solid #333;
            background: #1e1e1e;
            color: white;
            border-radius: 12px;
            outline: none;
            font-size: 1rem;
        }

        input:focus { border-color: var(--primary); }

        ul {
            list-style: none;
            padding: 0;
            text-align: left;
        }

        li {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--primary);
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 1.2rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>Study App Dark</h1>
    </header>

    <main class="container">
        <section class="card">
            <h2>⏱️ Foco</h2>
            <div class="timer-wrapper">
                <div id="timerDisplay" onclick="editTime()">25:00</div>
            </div>
            <p class="edit-hint">Clique no número para ajustar os minutos</p>
            
            <div class="timer-controls">
                <button id="startBtn" onclick="toggleTimer()">Iniciar</button>
                <button id="resetBtn" onclick="resetTimer()">Resetar</button>
            </div>
            <audio id="alarmSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>
        </section>

        <section class="card">
            <h2>📚 Minhas Metas</h2>
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="O que vamos estudar?">
                <button onclick="addTask()" style="background: var(--primary); color: #000;">+</button>
            </div>
            <ul id="taskList"></ul>
        </section>
    </main>

    <script>
        let defaultMinutes = 25;
        let timeLeft = defaultMinutes * 60;
        let timerId = null;

        const timerDisplay = document.getElementById('timerDisplay');
        const startBtn = document.getElementById('startBtn');
        const alarmSound = document.getElementById('alarmSound');

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function editTime() {
            if (timerId) return; // Não deixa editar enquanto corre
            
            const newTime = prompt("Digite os minutos (ex: 10, 45, 60):", Math.floor(timeLeft / 60));
            if (newTime !== null && !isNaN(newTime) && newTime > 0) {
                defaultMinutes = parseInt(newTime);
                timeLeft = defaultMinutes * 60;
                updateDisplay();
            }
        }

        function playAlarm() {
            alarmSound.play().catch(e => console.warn("Som bloqueado."));
        }

        function toggleTimer() {
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
                startBtn.textContent = 'Continuar';
                startBtn.style.background = "var(--success)";
            } else {
                startBtn.textContent = 'Pausar';
                startBtn.style.background = "#FF9800";
                timerId = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateDisplay();
                    } else {
                        clearInterval(timerId);
                        timerId = null;
                        startBtn.textContent = 'Iniciar';
                        playAlarm();
                        alert('Tempo esgotado!');
                    }
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(timerId);
            timerId = null;
            timeLeft = defaultMinutes * 60;
            updateDisplay();
            startBtn.textContent = 'Iniciar';
            startBtn.style.background = "var(--success)";
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const taskList = document.getElementById('taskList');
            if (input.value.trim() === '') return;
            const li = document.createElement('li');
            li.innerHTML = `<span>${input.value}</span><button class="delete-btn" onclick="this.parentElement.remove()">✕</button>`;
            taskList.appendChild(li);
            input.value = '';
        }

        // PWA Service Worker (Inline)
        if ('serviceWorker' in navigator) {
            const swCode = "self.addEventListener('fetch', function(event) {});";
            const blob = new Blob([swCode], {type: 'text/javascript'});
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl).catch(() => {});
        }
    </script>
</body>
</html>
